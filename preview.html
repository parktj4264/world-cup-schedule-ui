      }, []);

      const renderCell = (cell, now, nextMatch) => {
        const hasKorea = cell.matches.some((match) => match.isKorea);
        const hasNext = cell.matches.some((match) => nextMatch && match.id === nextMatch.id);
        const hasLive = cell.matches.some((match) => isLive(match, now));
        const className = ["empty", hasKorea ? "korea" : "", hasNext ? "next" : "", hasLive ? "live-border" : ""].filter(Boolean).join(" ");

        if (cell.matches.length === 0) return `<td class="${className}" aria-label="빈 경기 칸"></td>`;

        return `<td class="${className}">${groupMatches(cell.matches).map((group) => {
          const groupPast = group.matches.every((match) => isPast(match, now));
          const groupLive = group.matches.some((match) => isLive(match, now));
          return `<div class="match-group ${groupPast ? "past" : ""}">
            <div class="match-meta"><span class="time">${group.timeLabel}</span>, ${group.group} ${group.round}${groupLive ? '<span class="live">LIVE</span>' : ""}</div>
            ${group.matches.map((match) => `<div class="teams"><span>${match.homeFlag}</span> ${match.home} <strong>:</strong> ${match.away} <span>${match.awayFlag}</span></div>`).join("")}
          </div>`;
        }).join("")}</td>`;
      };

      const render = () => {
        const now = new Date();
        const todayKey = getTodayKey(now);
        const nextMatch = getNext(now);
        const liveMatches = allMatches().filter((match) => isLive(match, now));

        document.getElementById("current-time").textContent = `현재 시각: ${formatKst(now)} KST`;
        document.getElementById("next-match").textContent = nextMatch ? `다음 경기: ${nextMatch.timeLabel} ${nextMatch.home} : ${nextMatch.away}` : "다음 경기: 예정된 경기가 없습니다";
        document.getElementById("live-match").innerHTML = liveMatches.length ? `진행 중: <span class="live">LIVE</span> ${liveMatches.map((match) => `${match.timeLabel} ${match.home} : ${match.away}`).join(" / ")}` : "";

        const rows = days.map((day) => {
          const cells = activeFilter === "korea"
            ? day.cells.map((cell) => ({ matches: cell.matches.filter((match) => match.isKorea) }))
            : day.cells;
          return { ...day, cells };
        }).filter((day) => {
          if (activeFilter === "today") return day.date === todayKey;
          if (activeFilter === "korea") return day.cells.some((cell) => cell.matches.length);
          return true;
        });

        const target = document.getElementById("schedule");
        if (!rows.length) {
          target.innerHTML = '<div class="no-rows">표시할 일정이 없습니다.</div>';
          return;
        }

        target.innerHTML = `<table aria-label="조별리그 일정">
          <colgroup>
            <col class="date-col" />
            <col class="match-col" />
            <col class="match-col" />
            <col class="match-col" />
            <col class="match-col" />
          </colgroup>
          <tbody>
            ${rows.map((day) => {
              const normalizedCells = day.cells.slice(0, 4);
              while (normalizedCells.length < 4) normalizedCells.push({ matches: [] });
              return `<tr>
                <th scope="row"><div class="date-label">${day.dateLabel}</div><div class="weekday">(${day.weekday})</div></th>
                ${normalizedCells.map((cell) => renderCell(cell, now, nextMatch)).join("")}
              </tr>`;
            }).join("")}
          </tbody>
        </table>`;
      };

      document.querySelectorAll("[data-filter]").forEach((button) => {
        button.addEventListener("click", () => {
          activeFilter = button.dataset.filter;
          document.querySelectorAll("[data-filter]").forEach((target) => target.classList.toggle("active", target === button));
          render();
        });
      });

      render();
      setInterval(render, 30000);
    </script>
  </body>
</html>
