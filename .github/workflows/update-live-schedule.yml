name: Update live schedule

on:
  schedule:
    # 2026 World Cup match-heavy hours in KST, expressed in UTC.
    # KST 00:00-14:59 during June/July: poll every 15 minutes.
    - cron: '7,22,37,52 15-23 * 6,7 *'
    - cron: '7,22,37,52 0-5 * 6,7 *'
    # KST 15:00-23:59 during June/July: keep a lighter hourly heartbeat.
    - cron: '17 6-14 * 6,7 *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-live-schedule:
    runs-on: ubuntu-latest
    env:
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Fetch live schedule
        run: npm run fetch:live

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-live-schedule
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
